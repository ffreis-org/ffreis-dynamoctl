name: DevOps / PR Hygiene

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic-pr:
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-semantic-pr.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf

  actionlint:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-actionlint.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      working-directory: "."

  labeler:
    if: github.event_name == 'pull_request_target'
    permissions:
      contents: read
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-labeler.yml@d9792d01b442d7f2d3d2c6855cb312d885594e0f
    with:
      rules-json: |-
        [
          {"label":"ci","patterns":[".github/workflows/**",".github/actions/**"]},
          {"label":"go","patterns":["**/*.go","go.mod","go.sum"]},
          {"label":"aws","patterns":["internal/aws/**","internal/dynamodb/**"]},
          {"label":"docs","patterns":["**/*.md"]}
        ]

