name: CodeQL

on:
  schedule:
    - cron: "10 6 19 * *"  # monthly scattered (was: 42 15 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@287f836a726a35af37bd24561fc687f66eaeb92f # v1.7.0
    with:
      languages: "go"
