name: CodeQL

on:
  schedule:
    - cron: "42 15 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@b9c2640bf692a05e04dc6456682182bbe331e434 # v1.2.3
    with:
      languages: "go"
