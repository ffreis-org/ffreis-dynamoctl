name: Code Quality (SonarCloud)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'sonar-project.properties'
      - '.github/workflows/code-quality.yml'
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  sonar:
    permissions:
      contents: read
    uses: ffreis-org/ffreis-workflows-go/.github/workflows/go-sonar.yml@d8bfbc4bfe6b7b9b9c0d5b85bf69062831380950
    with:
      go-version: "1.25"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
