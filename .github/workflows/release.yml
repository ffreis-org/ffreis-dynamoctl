name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    timeout-minutes: 30
    name: Build & release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.8"
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUTPUT="dist/dynamoctl-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}"
          mkdir -p dist
          go build -trimpath \
            -ldflags "-X 'github.com/ffreis/dynamoctl/cmd.version=${VERSION}' \
                      -X 'github.com/ffreis/dynamoctl/cmd.commit=${COMMIT}' \
                      -X 'github.com/ffreis/dynamoctl/cmd.buildTime=${BUILD_TIME}'" \
            -o "${OUTPUT}" .
          sha256sum "${OUTPUT}" >> dist/checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            dist/dynamoctl-*
            dist/checksums.txt
