name: DevOps / Go CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  mod-tidy:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mod-tidy-check.yml@796c71fd32741742ac14e0f717997297d1e0dbfb # v1.1.2
    with:
      go-version: "1.25.8"
      working-directory: "."

  fmt:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@796c71fd32741742ac14e0f717997297d1e0dbfb # v1.1.2
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    needs: [fmt]
    permissions:
      contents: read
      pull-requests: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@796c71fd32741742ac14e0f717997297d1e0dbfb # v1.1.2
    with:
      go-version: "1.25.8"
      working-directory: "."

  test:
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@796c71fd32741742ac14e0f717997297d1e0dbfb # v1.1.2
    with:
      go-version: "1.25.8"
      working-directory: "."
